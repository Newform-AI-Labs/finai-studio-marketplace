# TerraformKubernetesAppSchemaV1. Form is defined by metadata.display.yaml.
# images: map keyed by image name (sub-path under the repo prefix
# us-docker.pkg.dev/newform-public/finai-studio-repo). Declares the chart
# artifact plus the workload images the chart deploys.
images:
  finai-studio: {}
  finai-studio-backend:
    variables:
      backend_image_repo:
        type: REPO_WITH_REGISTRY_WITH_NAME
      backend_image_tag:
        type: TAG
  finai-studio-frontend:
    variables:
      frontend_image_repo:
        type: REPO_WITH_REGISTRY_WITH_NAME
      frontend_image_tag:
        type: TAG
