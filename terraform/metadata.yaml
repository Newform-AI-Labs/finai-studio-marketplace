apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: finai-studio
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: FinAI Studio (Intelligent Agents)
    source:
      repo: https://github.com/Newform-AI-Labs/finai-studio-marketplace
      sourceType: git
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description:
      tagline: Kubernetes-native Agentic AI platform.
  content: {}
  interfaces:
    variables:
      - name: project_id
        description: GCP project id
        varType: string
        required: true
      - name: goog_cm_deployment_name
        description: Marketplace deployment name (injected automatically).
        varType: string
        defaultValue: ""
      - name: helm_release_name
        varType: string
        defaultValue: ""
      - name: helm_chart_repo
        varType: string
        defaultValue: oci://us-docker.pkg.dev/newform-public/finai-studio-repo
      - name: helm_chart_name
        varType: string
        defaultValue: finai-studio
      - name: helm_chart_version
        varType: string
        defaultValue: "1.0"
      - name: namespace
        varType: string
        defaultValue: agentic-ai-internal
      - name: create_cluster
        varType: bool
        defaultValue: false
      - name: create_cluster_service_account
        varType: bool
        defaultValue: false
      - name: cluster_service_account
        varType: string
        defaultValue: ""
      - name: kubernetes_version
        varType: string
        defaultValue: "1.30"
      - name: cluster_name
        varType: string
        required: true
      - name: cluster_location
        varType: string
        required: true
      - name: ip_range_pods
        varType: string
        defaultValue: ""
      - name: ip_range_services
        varType: string
        defaultValue: ""
      - name: network_name
        varType: string
        defaultValue: default
      - name: subnetwork_name
        varType: string
        defaultValue: default
      - name: subnetwork_region
        varType: string
        defaultValue: us-central1
      - name: customer_region
        varType: string
        defaultValue: us-central1
      - name: customer_artifact_registry
        varType: string
        defaultValue: ""
      - name: build_context_bucket
        varType: string
        defaultValue: ""
      - name: vertex_ai_location
        varType: string
        defaultValue: us-central1
      - name: cloudsql_instance_connection_name
        varType: string
        defaultValue: ""
      - name: database_existing_secret
        varType: string
        defaultValue: finai-db-credentials
      - name: studio_controller_gsa
        varType: string
        defaultValue: ""
      - name: image_builder_gsa
        varType: string
        defaultValue: ""
      - name: agent_runtime_gsa
        varType: string
        defaultValue: ""
      - name: workflow_runtime_gsa
        varType: string
        defaultValue: ""
      - name: datasource_runtime_gsa
        varType: string
        defaultValue: ""
      - name: preinstall_validator_gsa
        varType: string
        defaultValue: ""
      - name: backend_replicas
        varType: number
        defaultValue: 2
      - name: frontend_replicas
        varType: number
        defaultValue: 2
    outputs:
      - name: deployment_name
        description: Helm release name.
      - name: namespace
        description: Control-plane namespace.
      - name: chart_version
        description: Installed chart version.
      - name: project_id
        description: GCP project ID.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/container.admin
          - roles/artifactregistry.reader
          - roles/compute.networkViewer
    services:
      - container.googleapis.com
      - artifactregistry.googleapis.com
      - aiplatform.googleapis.com
      - sqladmin.googleapis.com
      - secretmanager.googleapis.com
      - compute.googleapis.com
