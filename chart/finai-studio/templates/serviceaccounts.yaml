{{- /*
Workload Identity KSAs. The iam.gke.io/gcp-service-account annotation binds
each KSA to a customer-provisioned GSA. Customer supplies the GSA emails on the
install form; here we annotate per the {component}.gsaEmail values if present.
*/ -}}
{{- $sa := .Values.serviceAccounts -}}

# studio-controller — backend pod (creates Jobs/Deployments/Services/HPAs)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.studioController }}
  namespace: {{ .Values.namespaces.control }}
  labels:
    {{- include "finai.labels" . | nindent 4 }}
  {{- with $sa.studioControllerGsa }}
  annotations:
    iam.gke.io/gcp-service-account: {{ . }}
  {{- end }}
---
# image-builder — Kaniko build Jobs (control-plane namespace)
apiVersion: v1
