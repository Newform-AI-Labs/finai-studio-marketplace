apiVersion: v2
name: finai-studio
description: >-
  FinAI Studio — a Kubernetes-native Agentic AI platform. Deploys the control
  plane (frontend + backend), agent runtime, workflow runtime, and datasource
  (MCP) runtime into the customer's existing GKE cluster. Custom agents,
  workflows, and datasources are built in-cluster via Kaniko and pushed to the
  customer's own Artifact Registry.
type: application

# Chart version — bump on every chart change (SemVer).
version: 0.1.0

# Application version — tracks the FinAI Studio product release shipped via
# the publisher Artifact Registry images.
appVersion: "1.0.0"

home: https://www.newformtech.ai/marketplace
sources:
  - https://github.com/Newform-AI-Labs/finai-studio-marketplace
maintainers:
  - name: Newform Technologies
    email: solutions@newformtech.ai

annotations:
  # GCP Marketplace product identity. Must match the image annotation
  # com.googleapis.cloudmarketplace.product.service.name baked into the images.
  marketplace.cloud.google.com/product-id: "finai-studio"
